# Render Blueprint — deploys the full-stack app (Express + built SPA) as one
# free web service. Create the service via render.com → New → Blueprint, then
# set the two secret env vars (GEMINI_API_KEY, TAVILY_API_KEY) in the dashboard.
services:
  - type: web
    name: brand-strategy-builder
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.cjs
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false   # set in the Render dashboard (secret)
      - key: TAVILY_API_KEY
        sync: false   # set in the Render dashboard (secret)
      - key: SUPABASE_URL
        sync: false   # user accounts + cloud save
      - key: SUPABASE_ANON_KEY
        sync: false   # anon key is client-safe (RLS enforces access)
